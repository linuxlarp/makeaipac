<!doctype html>
<html>
    <head>
        <link rel="stylesheet" href="card.css" />
        <style>
            @font-face {
                font-family: "AIPACFont";
                src: url("/assets/font.ttf") format("truetype");
            }
            body {
                font-family: "AIPACFont";
            }
        </style>
    </head>

    <body>
        <h1>Generate AIPAC</h1>
        <div class="card">
            <img src="/assets/template.jpg" />

            <div class="ovr name-block">
                <span class="ovr name">{{name}}</span>
                <span class="ovr occupation">{{occupation}}</span>
            </div>

            <span class="ovr money">{{money}}</span>
        </div>

        <form class="details">
            <label for="name">Name:</label><br />
            <input type="text" id="name" name="name" />

            <label for="name">Occupation</label><br />
            <input type="text" id="occupation" name="occupation" />

            <label for="name">Money Recieved</label><br />
            <input type="number" id="money" name="money" />
        </form>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

        <script>
            const state = {
                name: "Example",
                title: "Person of Interest",
                money: "500000",
            };

            const nameInputField = document.getElementById("name");
            const nameSpan = document.querySelector(".name");

            const occupationInputField = document.getElementById("occupation");
            const occupationSpan = document.querySelector(".occupation");

            const moneyInputField = document.getElementById("money");
            const moneySpan = document.querySelector(".money");

            nameInputField.addEventListener("input", (e) => {
                nameSpan.textContent = e.target.value.toUpperCase();
            });

            occupationInputField.addEventListener("input", (e) => {
                occupationSpan.textContent = e.target.value.toUpperCase();
            });

            moneyInputField.addEventListener("input", (e) => {
                const num = parseFloat(e.target.value);
                const formatted = isNaN(num)
                    ? "$0.00"
                    : num.toLocaleString("en-us", {
                          style: "currency",
                          currency: "USD",
                      });

                const length = formatted.length;
                const size = Math.max(2, 10 - length * 0.3);

                moneySpan.style.fontSize = `${size}cqw`;
                moneySpan.textContent = formatted;
            });
        </script>
    </body>
</html>
