<!doctype html>
<html>
    <head>
        <link rel="stylesheet" href="card.css" />
        <link rel="stylesheet" href="styles.css" />
        <style>
            @font-face {
                font-family: "AIPACFont";
                src: url("/assets/font.ttf") format("truetype");
            }

            @font-face {
                font-family: "SecondaryFont";
                src: url("/assets/bold.ttf") format("truetype");
            }

            body {
                font-family: "AIPACFont";
            }
        </style>
    </head>
    <body>
        <h1>TrackAIPAC Meme Generator (MakeAIPAC)</h1>
        <p>
            An AIPAC meme generator, make it seem like Your friends and family
            are funded by AIPAC by generating TrackAIPAC style graphics locally
            on your web browser!
        </p>
        <div class="layout">
            <div class="card">
                <img src="/assets/template.jpg" />
                <div class="ovr name-block">
                    <span class="ovr name">{{name}}</span>
                    <span class="ovr occupation">{{occupation}}</span>
                </div>
                <span class="ovr money">{{money}}</span>
                <div class="portrait-frame" id="portrait-frame">
                    <img class="portrait" id="portrait" />
                </div>
            </div>
            <div class="details">
                <div class="field">
                    <label>Name</label>
                    <input type="text" id="name" />
                </div>
                <div class="field">
                    <label>Occupation</label>
                    <input type="text" id="occupation" />
                </div>
                <div class="field">
                    <label>Money Received</label>
                    <input type="number" id="money" />
                </div>
                <div class="field">
                    <label>Portrait</label>
                    <input type="file" id="imageUpload" accept="image/*" />
                </div>
                <h3>Image Options</h3>
                <div class="slider-row">
                    <label>X Pos</label>
                    <input
                        type="range"
                        id="xPosSlider"
                        min="0"
                        max="100"
                        value="2"
                    />
                </div>
                <div class="slider-row">
                    <label>Y Pos</label>
                    <input
                        type="range"
                        id="yPosSlider"
                        min="0"
                        max="100"
                        value="5"
                    />
                </div>
                <div class="slider-row">
                    <label>Size</label>
                    <input
                        type="range"
                        id="sizeSlider"
                        min="10"
                        max="100"
                        value="45"
                    />
                </div>
            </div>
        </div>

        <footer>
            <a href="https://github.com/linuxlarp/makeaipac" target="_blank"
                >⭐ Star this project on GitHub!</a
            >
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="app.js"></script>
    </body>
</html>
